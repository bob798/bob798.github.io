name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [handbook-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout ai-handbook
        uses: actions/checkout@v6
        with:
          repository: bob798/ai-handbook
          path: _handbook
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Sync handbook markdown (pre-build)
        run: bash ./scripts/sync-handbook.sh _handbook

      - name: Build Quartz
        run: npx quartz build

      - name: Sync handbook HTML (post-build)
        run: bash ./scripts/sync-handbook.sh --html _handbook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
